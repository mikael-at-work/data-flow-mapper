<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Flow Mapper</title>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

  <!-- Styling -->
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
    }

    header {
      background: linear-gradient(90deg, #1f3b5b, #2d5b8a);
      color: white;
      padding: 18px 28px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1f2937;
      color: white;
      padding: 20px;
    }

    .flow-card {
      background: #374151;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .flow-card:hover {
      background: #4b5563;
      transform: translateX(2px);
    }

    .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 18px;
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
    }

    .card h2 {
      margin-top: 0;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta div {
      background: #f8fafc;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      color: #111827;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dbeafe;
      margin-right: 8px;
      font-size: 12px;
      color: #1e3a8a;
    }

    #diagram {
      min-height: 320px;
    }
  </style>
</head>

<body>
  <header>Data Flow Mapper</header>

  <div class="container">
    
    <!-- Sidebar -->
    <div class="sidebar" id="flowList"></div>

    <!-- Main -->
    <div class="main">
      <div id="details"></div>
      <div class="card">
        <div id="diagram" class="mermaid"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
